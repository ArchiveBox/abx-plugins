<!-- Chrome MHTML thumbnail - scaled down iframe preview of captured browser MHTML -->
<div class="extractor-thumbnail chrome-mhtml-thumbnail" style="width: 100%; height: 100px; overflow: hidden; background: #fff;">
    <iframe src="{{ output_path }}?preview=1"
            style="width: 400%; height: 400px; transform: scale(0.25); transform-origin: top left; pointer-events: none; border: none;"
            loading="lazy"
            fetchpriority="low"
            sandbox="allow-same-origin allow-scripts">
    </iframe>
</div>
