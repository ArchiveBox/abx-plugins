name: Verify Chromium launch
description: Validate that resolved Chromium can start and execute CDP target operations.
inputs:
  chrome-path:
    description: Path to the abxpkg-resolved Chromium binary. Defaults to CHROME_BINARY.
    required: false
    default: ""
  timeout-ms:
    description: Milliseconds to wait for DevTools and CDP.
    required: false
    default: "30000"
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        chrome_path="${{ inputs.chrome-path }}"
        if [ -z "$chrome_path" ]; then
          chrome_path="${CHROME_BINARY:?CHROME_BINARY must point to the abxpkg-resolved binary}"
        fi
        CHROME_VERIFY_PATH="$chrome_path" "${NODE_BINARY:?NODE_BINARY must point to the abxpkg-resolved binary}" - <<'NODE'
        const { spawn } = require("node:child_process");
        const { mkdtempSync, readFileSync, watch } = require("node:fs");
        const { tmpdir } = require("node:os");
        const { join } = require("node:path");

        const chrome = process.env.CHROME_VERIFY_PATH;
        if (!chrome) throw new Error("CHROME_VERIFY_PATH is required");
        const timeoutMs = Number("${{ inputs.timeout-ms }}");
        const userDataDir = mkdtempSync(join(tmpdir(), "abx-chromium-verify-"));
        const activePortPath = join(userDataDir, "DevToolsActivePort");

        let proc;
        let wsUrl;
        let ws;
        let closed = false;

        const waitForWsUrl = () =>
          new Promise((resolve, reject) => {
            let settled = false;
            const finish = (error, url) => {
              if (settled) return;
              settled = true;
              clearTimeout(timer);
              watcher.close();
              proc.off("exit", onExit);
              if (error) reject(error);
              else resolve(url);
            };
            const readActivePort = () => {
              let lines;
              try {
                lines = readFileSync(activePortPath, "utf8").trim().split(/\r?\n/);
              } catch {
                return;
              }
              const port = Number(lines[0]);
              const browserPath = String(lines[1] || "").trim();
              if (!Number.isInteger(port) || port <= 0 || !browserPath.startsWith("/")) return;
              wsUrl = `ws://127.0.0.1:${port}${browserPath}`;
              finish(null, wsUrl);
            };
            const onExit = (code, signal) => {
              finish(new Error(`Chromium exited before exposing CDP (code=${code}, signal=${signal})`));
            };
            const watcher = watch(userDataDir, (_eventType, filename) => {
              if (String(filename || "") === "DevToolsActivePort") readActivePort();
            });
            const timer = setTimeout(() => {
              finish(new Error(`Chromium did not create DevToolsActivePort within ${timeoutMs}ms`));
            }, timeoutMs);
            proc.once("exit", onExit);
            readActivePort();
          });

        const cleanup = () => {
          if (ws && !closed) {
            try {
              ws.close();
            } catch {}
          }
          if (proc && !proc.killed) {
            proc.kill("SIGKILL");
          }
        };

        const connectAndVerify = (url) =>
          new Promise((resolve, reject) => {
            const deadline = Date.now() + timeoutMs;
            const pending = new Map();
            let nextId = 1;

            const fail = (error) => {
              if (closed) return;
              closed = true;
              for (const { reject } of pending.values()) reject(error);
              pending.clear();
              reject(error);
            };

            const send = (method, params = {}, sessionId) =>
              new Promise((resolveSend, rejectSend) => {
                if (closed) {
                  rejectSend(new Error(`socket closed before ${method}`));
                  return;
                }
                const id = nextId++;
                pending.set(id, { resolve: resolveSend, reject: rejectSend });
                const message = { id, method, params };
                if (sessionId) message.sessionId = sessionId;
                ws.send(JSON.stringify(message));
              });

            ws = new WebSocket(url);

            const timer = setTimeout(() => {
              fail(new Error(`CDP connect + verify timed out after ${timeoutMs}ms`));
            }, timeoutMs);

            ws.addEventListener("open", async () => {
              try {
                const createdTarget = await send("Target.createTarget", { url: "about:blank" });
                if (!createdTarget.targetId) throw new Error("CDP did not create a blank page target");

                const attached = await send("Target.attachToTarget", {
                  targetId: createdTarget.targetId,
                  flatten: true,
                });
                const sessionId = attached.sessionId;
                if (!sessionId) {
                  throw new Error("CDP did not return a sessionId for the page target");
                }

                await send("Runtime.enable", {}, sessionId);
                const evaluated = await send(
                  "Runtime.evaluate",
                  { expression: "1 + 1", returnByValue: true },
                  sessionId,
                );
                const value = evaluated?.result?.value;
                if (value !== 2) {
                  throw new Error(`Unexpected Runtime.evaluate result: ${JSON.stringify(evaluated)}`);
                }

                clearTimeout(timer);
                closed = true;
                resolve();
              } catch (error) {
                clearTimeout(timer);
                fail(error instanceof Error ? error : new Error(String(error)));
              }
            });

            ws.addEventListener("message", (event) => {
              let message;
              try {
                message = JSON.parse(String(event.data));
              } catch {
                return;
              }
              if (!message || typeof message.id !== "number") return;
              const pendingRequest = pending.get(message.id);
              if (!pendingRequest) return;
              pending.delete(message.id);
              if (message.error) {
                pendingRequest.reject(
                  new Error(
                    message.error.message || `CDP ${message.error.code || "error"} on ${message.method || "request"}`,
                  ),
                );
                return;
              }
              pendingRequest.resolve(message.result || {});
            });

            ws.addEventListener("error", (event) => {
              const message = event?.error?.message || event?.message || "unknown websocket error";
              clearTimeout(timer);
              fail(new Error(`Failed to connect to Chromium CDP: ${message}`));
            });

            ws.addEventListener("close", () => {
              if (!closed && Date.now() < deadline) {
                clearTimeout(timer);
                fail(new Error("Chromium CDP websocket closed before verification completed"));
              }
            });
          });

        (async () => {
          try {
            const startTime = Date.now();
            const args = [
              "--ash-no-nudges",
              "--block-new-web-contents",
              "--deny-permission-prompts",
              "--disable-background-networking",
              "--disable-breakpad",
              "--disable-client-side-phishing-detection",
              "--disable-component-update",
              "--disable-components=AcceptCHFrame,OptimizationHints,ProcessPerSiteUpToMainFrameThreshold,InterestFeedContentSuggestions,CalculateNativeWinOcclusion,BackForwardCache,HeavyAdPrivacyMitigations,LazyFrameLoading,ImprovedCookieControls,PrivacySandboxSettings4,AutofillServerCommunication,CertificateTransparencyComponentUpdater,DestroyProfileOnBrowserClose,CrashReporting,OverscrollHistoryNavigation,InfiniteSessionRestore",
              "--disable-datasaver-prompt",
              "--disable-default-apps",
              "--disable-desktop-notifications",
              "--disable-dev-shm-usage",
              "--disable-domain-reliability",
              "--disable-extensions",
              "--disable-external-intent-requests",
              "--disable-hang-monitor",
              "--disable-infobars",
              "--disable-notifications",
              "--disable-popup-blocking",
              "--disable-print-preview",
              "--disable-prompt-on-repost",
              "--disable-search-engine-choice-screen",
              "--disable-session-crashed-bubble",
              "--disable-setuid-sandbox",
              "--disable-site-isolation-trials",
              "--disable-speech-api",
              "--disable-speech-synthesis-api",
              "--disable-sync",
              "--disable-web-security",
              "--headless=new",
              "--hide-crash-restore-bubble",
              "--metrics-recording-only",
              "--no-default-browser-check",
              "--no-first-run",
              "--no-pings",
              "--no-sandbox",
              "--no-zygote",
              "--noerrdialogs",
              "--password-store=basic",
              "--remote-debugging-port=0",
              `--user-data-dir=${userDataDir}`,
              "--safebrowsing-disable-auto-update",
              "--silent-debugger-extension-api",
              '--simulate-outdated-no-au="Tue, 31 Dec 2099 23:59:59 GMT"',
              "--suppress-message-center-popups",
              "--test-type=gpu",
              "--use-mock-keychain",
              "about:blank",
            ];

            proc = spawn(chrome, args, { stdio: ["ignore", "pipe", "pipe"] });
            proc.stdout.pipe(process.stdout);
            proc.stderr.pipe(process.stderr);

            const url = await waitForWsUrl();
            const wsFoundMs = Date.now() - startTime;
            console.log(`CDP URL found after ${(wsFoundMs / 1000).toFixed(2)}s, verifying browser target...`);
            await connectAndVerify(url);
            const totalMs = Date.now() - startTime;
            console.log(`Chromium launched and verified in ${(totalMs / 1000).toFixed(2)}s`);
            cleanup();
            process.exit(0);
          } catch (error) {
            cleanup();
            console.error(error instanceof Error ? error.message : String(error));
            process.exit(1);
          }
        })();
        NODE
