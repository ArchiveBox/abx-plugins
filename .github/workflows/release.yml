name: Release State

on:
  workflow_run:
    workflows: [Parallel Tests]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_sha:
        description: Full commit SHA on main to release
        required: true
        type: string

permissions:
  actions: read
  contents: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release-state:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-24.04
    environment: pypi
    env:
      RELEASE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.release_sha }}
      RELEASE_BRANCH: main
      TEST_RUN_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || '' }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_SHA }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.13"

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Download tested package artifacts
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || github.token }}
        run: |
          set -Eeuo pipefail
          run_id="$TEST_RUN_ID"
          if [[ -z "$run_id" ]]; then
            run_id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow test-parallel.yml --event push --commit "$RELEASE_SHA" --status success --limit 2 --json databaseId --jq 'if length == 1 then .[0].databaseId else error("expected exactly one successful test run") end')"
          fi
          gh run download "$run_id" --repo "$GITHUB_REPOSITORY" --name "python-distributions-$RELEASE_SHA" --dir dist
          shopt -s nullglob
          wheels=(dist/abx_plugins-*.whl)
          sdists=(dist/abx_plugins-*.tar.gz)
          manifests=(dist/SHA256SUMS)
          [[ "${#wheels[@]}" -eq 1 ]]
          [[ "${#sdists[@]}" -eq 1 ]]
          [[ "${#manifests[@]}" -eq 1 ]]
          (cd dist && sha256sum --check SHA256SUMS)

      - name: Run release script
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || github.token }}
        run: ./bin/release.sh dist
