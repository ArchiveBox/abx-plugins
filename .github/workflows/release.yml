name: Release State

on:
  workflow_run:
    workflows: [Parallel Tests]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      release_sha:
        description: Full commit SHA on main to release
        required: true
        type: string
      test_run_id:
        description: Successful Parallel Tests run for the exact release SHA
        required: true
        type: string

permissions:
  actions: read
  contents: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release-state:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-24.04
    environment: pypi
    env:
      RELEASE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.release_sha }}
      RELEASE_BRANCH: main
      TEST_RUN_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || inputs.test_run_id }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_SHA }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.13"

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.3"
          enable-cache: true

      - name: Project host release tools through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py release_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Download tested package artifacts
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || github.token }}
        run: |
          set -Eeuo pipefail
          run_id="$TEST_RUN_ID"
          "${GH_BINARY}" run view "$run_id" --repo "$GITHUB_REPOSITORY" \
            --json workflowName,conclusion,headSha,event \
            --jq 'if .workflowName == "Parallel Tests" and .conclusion == "success" and .headSha == env.RELEASE_SHA and (.event == "push" or .event == "workflow_dispatch") then true else error("test run does not prove the requested release SHA") end'
          "${GH_BINARY}" run download "$run_id" --repo "$GITHUB_REPOSITORY" --name "python-distributions-$RELEASE_SHA" --dir dist
          shopt -s nullglob
          wheels=(dist/abx_plugins-*.whl)
          sdists=(dist/abx_plugins-*.tar.gz)
          manifests=(dist/SHA256SUMS)
          [[ "${#wheels[@]}" -eq 1 ]]
          [[ "${#sdists[@]}" -eq 1 ]]
          [[ "${#manifests[@]}" -eq 1 ]]
          DIST_DIR=dist "${UV_BINARY}" run --no-project python - <<'PY'
          import hashlib
          import os
          import re
          from pathlib import Path

          dist_dir = Path(os.environ["DIST_DIR"])
          wheels = list(dist_dir.glob("abx_plugins-*.whl"))
          sdists = list(dist_dir.glob("abx_plugins-*.tar.gz"))
          if len(wheels) != 1 or len(sdists) != 1:
              raise SystemExit("Expected exactly one wheel and one sdist")
          expected_names = {wheels[0].name, sdists[0].name}
          manifest = {}
          for line in (dist_dir / "SHA256SUMS").read_text().splitlines():
              digest, filename = line.split(maxsplit=1)
              if not re.fullmatch(r"[0-9a-f]{64}", digest) or Path(filename).name != filename:
                  raise SystemExit(f"Invalid checksum entry: {line}")
              manifest[filename] = digest
          if set(manifest) != expected_names:
              raise SystemExit("Checksum manifest must name exactly the wheel and sdist")
          for filename, digest in manifest.items():
              actual = hashlib.sha256((dist_dir / filename).read_bytes()).hexdigest()
              if actual != digest:
                  raise SystemExit(f"Checksum mismatch for {filename}")
          PY

      - name: Run release script
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || github.token }}
        run: ./bin/release.sh dist
