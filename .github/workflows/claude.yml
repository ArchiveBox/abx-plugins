name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone abx-pkg, abxbus, archivebox
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abx-pkg.git "${{ runner.temp }}/abx-pkg"
          git clone --depth=1 https://github.com/ArchiveBox/abxbus.git "${{ runner.temp }}/abxbus"
          git clone --depth=1 https://github.com/ArchiveBox/ArchiveBox.git "${{ runner.temp }}/archivebox"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: x64

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Set up Node JS
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          echo "PNPM_HOME=$HOME/.local/share/pnpm" >> $GITHUB_ENV
          echo "$HOME/.local/share/pnpm" >> $GITHUB_PATH

      - name: Install JS tooling
        run: pnpm add -g prettier

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-3.13-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-3.13-uv-

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git wget ripgrep build-essential python3-dev python3-setuptools \
            libssl-dev libldap2-dev libsasl2-dev zlib1g-dev libatomic1 \
            python3-minimal gnupg2 curl python3-ldap python3-msgpack \
            python3-mutagen python3-regex python3-pycryptodome procps

      - name: Install dependencies with uv
        run: |
          uv venv
          uv sync --dev --all-extras --no-sources
          uv pip install --no-deps -e ".[dev]"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: write

          track_progress: true

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          prompt: 'Always use `uv run` e.g. `uv run pytest ...` and never python directly. Always use `uv run ruff check`, `uv run pyright`, `uv run ty check` and never `py_compile` to check syntax. You can `uv pip install -e ../{abx-pkg,abxbus,archivebox}` or explore the source of those related packages if needed to understand the orchestrator environment or abxbus interfaces, but any changes to those repos will not be persisted.'

          branch_prefix: 'claude-'
          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: |
            --allowed-tools mcp__github_inline_comment__create_inline_comment,Bash,View,Glob,GlobTool,GrepTool,Grep,BatchTool,WebSearch,LS,Edit,MultiEdit,Write,Read

