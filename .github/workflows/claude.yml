name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        description: Claude Code prompt to use
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Clone companion repositories for source inspection
        run: |
          set -Eeuo pipefail
          git clone --depth=1 --branch main https://github.com/ArchiveBox/abxpkg.git "${{ runner.temp }}/abxpkg"
          git clone --depth=1 --branch main https://github.com/ArchiveBox/abxbus.git "${{ runner.temp }}/abxbus"
          git clone --depth=1 --branch main https://github.com/ArchiveBox/abx-dl.git "${{ runner.temp }}/abx-dl"
          git clone --depth=1 --branch dev https://github.com/ArchiveBox/ArchiveBox.git "${{ runner.temp }}/archivebox"

      - name: Set up Python 3.13.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.13"

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.3"
          activate-environment: "true"

      - name: Bootstrap locked Python dependencies
        run: |
          uv sync --locked --dev --no-sources
          uv sync --project "${{ runner.temp }}/abx-dl" --locked --no-sources

      - name: Resolve CI tooling through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -Eeuo pipefail
          mkdir -p "$ABXPKG_LIB_DIR/env/bin"
          export PATH="$ABXPKG_LIB_DIR/env/bin:$PATH"
          echo "ABXPKG_LIB_DIR=$ABXPKG_LIB_DIR" >> "$GITHUB_ENV"
          echo "$ABXPKG_LIB_DIR/env/bin" >> "$GITHUB_PATH"

          tooling_env="$(
            uv run --no-sync --no-sources abxpkg env \
              --install \
              --json \
              --lib="$ABXPKG_LIB_DIR" \
              --deps-from="$GITHUB_WORKSPACE/.github/configs/ci-tooling.json:prek_binaries"
          )"
          jq -r 'to_entries[] | "\(.key)=\(.value)"' \
            <<< "$tooling_env" >> "$GITHUB_ENV"

          test -x "$ABXPKG_LIB_DIR/env/bin/node"
          test -x "$ABXPKG_LIB_DIR/env/bin/prettier"
          "$ABXPKG_LIB_DIR/env/bin/node" --version
          "$ABXPKG_LIB_DIR/env/bin/prettier" --version

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@b76a0776ae74036e77cd11018083743453d7ad35 # v1
        with:
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          show_full_output: true
          # track_progress: true

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          prompt: |
            Always use `uv run` e.g. `uv run pytest ...` and never python directly. Always use `uv run ruff check`, `uv run pyright`, `uv run ty check` and never `py_compile` to check syntax.
            The companion repositories under ${{ runner.temp }} are available for source inspection, but their changes will not be persisted.
            Use `ABX_PLUGINS_DIR="$GITHUB_WORKSPACE/abx_plugins/plugins" uv run --project "${{ runner.temp }}/abx-dl" --no-sync abx-dl --plugins=pluginname --dir=/some/tmp/dir 'https://example.com'` to test and dont rely on pytest alone.

            Plugin required_binaries installation must succeed through the same locked abx-dl runtime and abxpkg provider path.
            Auto-install in macos/linux at runtime is a core part of the user-facing surface provided by plugins and must succeed in *all environments* including CI/sandboxes.
            
            Make sure any plugin changes are covered by a live integration test under the plugin's test dir that hits a real url like https://example.com.
            Do not mock the url with a test server and do not mock the installation or execution of any required_binaries, tests must use the real user-facing code paths to install and run with real live urls.
            Do not simply check that it runs without error, your tests must check that the content saved is actually correct for the live url.
            
            ${{inputs.prompt || ''}}

          branch_prefix: 'claude-'
          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: |
            --model claude-opus-4-6
            --max-turns 50
            --allowed-tools mcp__github_inline_comment__create_inline_comment,Bash,View,Glob,GlobTool,GrepTool,Grep,BatchTool,WebSearch,LS,Edit,MultiEdit,Write,Read
