name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        description: Claude Code prompt to use
        type: string

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Clone abxbus, abxpkg, abx-dl, archivebox
        run: |
          set -Eeuo pipefail
          git clone --depth=1 --branch v1.11.279 https://github.com/ArchiveBox/abxpkg.git "${{ runner.temp }}/abxpkg"
          [[ "$(git -C "${{ runner.temp }}/abxpkg" rev-parse HEAD)" == "5267299cc0efb3a3cb2c11005d181d22b4d66485" ]]
          [[ "$(git -C "${{ runner.temp }}/abxpkg" rev-parse 'refs/tags/v1.11.279^{commit}')" == "5267299cc0efb3a3cb2c11005d181d22b4d66485" ]]

          git clone --depth=1 --branch 2.5.38 https://github.com/ArchiveBox/abxbus.git "${{ runner.temp }}/abxbus"
          [[ "$(git -C "${{ runner.temp }}/abxbus" rev-parse HEAD)" == "8d29682941dca4b5feec8549bac71adf2740dd00" ]]
          [[ "$(git -C "${{ runner.temp }}/abxbus" rev-parse 'refs/tags/2.5.38^{commit}')" == "8d29682941dca4b5feec8549bac71adf2740dd00" ]]

          git clone --depth=1 --branch v1.11.262 https://github.com/ArchiveBox/abx-dl.git "${{ runner.temp }}/abx-dl"
          [[ "$(git -C "${{ runner.temp }}/abx-dl" rev-parse HEAD)" == "cc08a64d002bc47ac50e064c526b462f6bc9c9d2" ]]
          [[ "$(git -C "${{ runner.temp }}/abx-dl" rev-parse 'refs/tags/v1.11.262^{commit}')" == "cc08a64d002bc47ac50e064c526b462f6bc9c9d2" ]]

          git clone --depth=1 --branch v0.9.31-rc https://github.com/ArchiveBox/ArchiveBox.git "${{ runner.temp }}/archivebox"
          [[ "$(git -C "${{ runner.temp }}/archivebox" rev-parse HEAD)" == "c5d11c3224138d8ab84aa963429e9414a743bd6d" ]]
          [[ "$(git -C "${{ runner.temp }}/archivebox" rev-parse 'refs/tags/v0.9.31-rc^{commit}')" == "c5d11c3224138d8ab84aa963429e9414a743bd6d" ]]

      - name: Set up Python 3.13.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.13"

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.3"
          activate-environment: "true"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33

      - name: Configure pnpm global bin
        run: |
          PNPM_HOME="$HOME/.local/share/pnpm"
          mkdir -p "$PNPM_HOME"
          pnpm config set global-bin-dir "$PNPM_HOME"
          echo "PNPM_HOME=$PNPM_HOME" >> "$GITHUB_ENV"
          echo "$PNPM_HOME" >> "$GITHUB_PATH"

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "25.9.0"
          cache: 'pnpm'
          cache-dependency-path: pyproject.toml

      - uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: |
            git wget ripgrep build-essential python3-dev python3-setuptools \
            libssl-dev libldap2-dev libsasl2-dev zlib1g-dev libatomic1 \
            python3-minimal gnupg2 curl python3-ldap python3-msgpack \
            python3-mutagen python3-regex python3-pycryptodome procps
          version: 1.0

      - name: Install JS tooling
        run: pnpm add -g prettier@3.9.5

      - name: Install dependencies with uv
        run: |
          uv sync --dev --all-extras --no-sources
          uv pip install -e '${{ runner.temp }}/abxbus'
          uv pip install -e '${{ runner.temp }}/abx-dl'
          uv pip install -e '${{ runner.temp }}/abxpkg'
          uv pip install -e '${{ runner.temp }}/archivebox'
          uv pip install --no-deps -e ".[dev]"
          
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@b76a0776ae74036e77cd11018083743453d7ad35 # v1
        with:
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          show_full_output: true
          # track_progress: true

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          prompt: |
            Always use `uv run` e.g. `uv run pytest ...` and never python directly. Always use `uv run ruff check`, `uv run pyright`, `uv run ty check` and never `py_compile` to check syntax.
            You can `uv pip install -e ../{abxpkg,abxbus,archivebox}` or explore the source of those related packages if needed to understand the orchestrator or abxbus interfaces,
            but any changes to those repos will not be persisted. Use `abx-dl --plugins=pluginname --output=/some/tmp/dir 'https://example.com'` to test and dont rely on pytest alone.

            Plugin required_binaries install must succeed locally / in the test environment when running `abx-dl install pluginname` (uv pip install -e ../abx-dl.
            Auto-install in macos/linux at runtime is a core part of the user-facing surface provided by plugins and must succeed in *all environments* including CI/sandboxes.
            
            Make sure any plugin changes are covered by a live integration test under the plugin's test dir that hits a real url like https://example.com.
            Do not mock the url with a test server and do not mock the installation or execution of any required_binaries, tests must use the real user-facing code paths to install and run with real live urls.
            Do not simply check that it runs without error, your tests must check that the content saved is actually correct for the live url.
            
            ${{inputs.prompt || ''}}

          branch_prefix: 'claude-'
          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: |
            --model claude-opus-4-6
            --max-turns 50
            --allowed-tools mcp__github_inline_comment__create_inline_comment,Bash,View,Glob,GlobTool,GrepTool,Grep,BatchTool,WebSearch,LS,Edit,MultiEdit,Write,Read
