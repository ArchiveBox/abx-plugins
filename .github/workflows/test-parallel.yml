name: Parallel Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, main, master]
  push:
    branches: [dev, main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHONIOENCODING: utf-8
  PYTHONLEGACYWINDOWSSTDIO: utf-8
  USE_COLOR: False
  UV_NO_SOURCES: "1"

jobs:
  prek:
    name: Pre-commit checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Configure managed library
        run: |
          mkdir -p "$RUNNER_TEMP/abx-lib/env/bin"
          echo "LIB_DIR=$RUNNER_TEMP/abx-lib" >> "$GITHUB_ENV"
          echo "ABXPKG_LIB_DIR=$RUNNER_TEMP/abx-lib" >> "$GITHUB_ENV"

      - name: Clone runtime repositories
        run: |
          git clone --depth=1 https://github.com/ArchiveBox/abxpkg.git "${{ runner.temp }}/abxpkg"
          git clone --depth=1 https://github.com/ArchiveBox/abx-dl.git "${{ runner.temp }}/abx-dl"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: x64

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.6"

      - name: Set up Node JS
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          PNPM_HOME="$HOME/.local/share/pnpm"
          mkdir -p "$PNPM_HOME"
          pnpm config set global-bin-dir "$PNPM_HOME"
          echo "PNPM_HOME=$PNPM_HOME" >> "$GITHUB_ENV"
          echo "$PNPM_HOME" >> "$GITHUB_PATH"

      - name: Install JS tooling
        run: pnpm add -g prettier@3.9.5

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-3.13-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-3.13-uv-

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git wget ripgrep build-essential python3-dev python3-setuptools \
            libssl-dev libldap2-dev libsasl2-dev zlib1g-dev libatomic1 \
            python3-minimal gnupg2 curl python3-ldap python3-msgpack \
            python3-mutagen python3-regex python3-pycryptodome procps

      - name: Install dependencies with uv
        run: |
          uv venv
          uv pip install --group dev \
            -e "${{ runner.temp }}/abxpkg" \
            -e "${{ runner.temp }}/abx-dl" \
            -e .

      - name: Run prek
        env:
          PYTHONPATH: ${{ runner.temp }}/abxpkg
        run: uv run --no-sync --no-sources prek run --all-files

      - name: Run documentation code blocks
        env:
          PYTHONPATH: ${{ runner.temp }}/abxpkg
        run: |
          plugin_readmes=$(find abx_plugins/plugins -name README.md -type f | sort)
          uv run --no-sync --no-sources pytest -vv --tb=long \
            README.md AGENTS.md skills docs $plugin_readmes

  discover-tests:
    name: Discover test files
    runs-on: ubuntu-24.04
    outputs:
      test-files: ${{ steps.set-matrix.outputs.test-files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Discover test files
        id: set-matrix
        run: |
          plugin_tests=$(find abx_plugins/plugins -path "*/tests/test_*.py" -type f | sort)
          root_tests=""
          if [ -d tests ]; then
            root_tests=$(find tests -path "*/test_*.py" -type f | sort)
          fi
          all_tests=$(printf "%s\n%s\n" "$plugin_tests" "$root_tests" | sed '/^$/d')

          json_array="["
          first=true
          for test_file in $all_tests; do
            if [ "$first" = true ]; then
              first=false
            else
              json_array+="," 
            fi

            test_name=$(basename $test_file .py | sed 's/^test_//')
            name="$test_name"
            needs_chromium=false
            needs_brew=false
            if [[ "$test_file" == abx_plugins/plugins/*/tests/* ]]; then
              plugin_dir="${test_file%/tests/*}"
              plugin_name="$(basename "$plugin_dir")"
              if [[ "$plugin_name" == "chrome" ]] || \
                 jq -e '(.required_plugins // []) | index("chrome") != null' "$plugin_dir/config.json" >/dev/null; then
                needs_chromium=true
              fi
            elif grep -iq "chrom" "$test_file"; then
              needs_chromium=true
            fi

            if [[ "$test_file" == abx_plugins/plugins/brew/tests/* ]]; then
              needs_brew=true
            fi

            json_array+="{\"path\":\"$test_file\",\"name\":\"$name\",\"needs_chromium\":$needs_chromium,\"needs_brew\":$needs_brew}"
          done
          json_array+="]"

          echo "test-files=$json_array" >> $GITHUB_OUTPUT
          echo "Found $(echo $all_tests | wc -w) test files"
          echo "$json_array" | jq '.'

  run-tests:
    name: ${{ matrix.test.name }}
    runs-on: ubuntu-24.04
    needs: [prek, discover-tests]
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ABX_PYTEST_TEE_SUBPROCESS_OUTPUT: "1"

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        test: ${{ fromJson(needs.discover-tests.outputs.test-files) }}
        python: ["3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Clone abxpkg
        run: git clone --depth=1 https://github.com/ArchiveBox/abxpkg.git "${{ runner.temp }}/abxpkg"

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          architecture: x64

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.6"

      - name: Set up Node JS
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-${{ matrix.python }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.python }}-uv-

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git wget ripgrep build-essential python3-dev python3-setuptools \
            libssl-dev libldap2-dev libsasl2-dev zlib1g-dev libatomic1 \
            python3-minimal gnupg2 curl python3-ldap python3-msgpack \
            python3-mutagen python3-regex python3-pycryptodome procps

      - name: Install Homebrew
        if: ${{ matrix.test.needs_brew }}
        env:
          NONINTERACTIVE: "1"
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          echo "$HOMEBREW_PREFIX/bin" >> $GITHUB_PATH
          echo "$HOMEBREW_PREFIX/sbin" >> $GITHUB_PATH
          echo "PATH=$PATH" >> $GITHUB_ENV
          echo "HOMEBREW_PREFIX=$HOMEBREW_PREFIX" >> $GITHUB_ENV
          echo "HOMEBREW_CELLAR=$HOMEBREW_CELLAR" >> $GITHUB_ENV
          echo "HOMEBREW_REPOSITORY=$HOMEBREW_REPOSITORY" >> $GITHUB_ENV
          echo "MANPATH=$MANPATH" >> $GITHUB_ENV
          echo "INFOPATH=$INFOPATH" >> $GITHUB_ENV
          echo "XDG_DATA_DIRS=$XDG_DATA_DIRS" >> $GITHUB_ENV
          brew --version

      - name: Install dependencies with uv
        run: |
          uv venv
          uv pip install --group dev -e "${{ runner.temp }}/abxpkg" -e .

      - name: Select Chromium for extension-capable CDP
        if: ${{ matrix.test.needs_chromium }}
        env:
          LIB_DIR: ${{ runner.temp }}/abx-lib
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -euo pipefail
          mkdir -p "$LIB_DIR"
          echo "LIB_DIR=$LIB_DIR" >> "$GITHUB_ENV"
          echo "ABXPKG_LIB_DIR=$ABXPKG_LIB_DIR" >> "$GITHUB_ENV"

          uv run --no-sync --no-sources abxpkg env \
            --install \
            --lib="$LIB_DIR" \
            --deps-from="$PWD/abx_plugins/plugins/chrome/config.json:required_binaries" \
            >> "$GITHUB_ENV"

      - name: Verify Chromium launch
        if: ${{ matrix.test.needs_chromium }}
        uses: ./.github/actions/verify-chromium-launch

      - name: Run test - ${{ matrix.test.name }}
        env:
          PYTHONPATH: ${{ runner.temp }}/abxpkg
          TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
          CHROME_HEADLESS: "True"
        run: |
          uv run --no-sync --no-sources pytest -xvs -rA "${{ matrix.test.path }}" --basetemp="$RUNNER_TEMP/pytest-out"
