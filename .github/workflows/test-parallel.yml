name: Parallel Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event_name == 'workflow_dispatch' && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  PYTHONIOENCODING: utf-8
  PYTHONLEGACYWINDOWSSTDIO: utf-8
  USE_COLOR: False
  UV_NO_SOURCES: "1"

jobs:
  prek:
    name: Pre-commit checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 1

      - name: Set up Python 3.13.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.13"
          architecture: x64

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.3"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-3.13.13-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-3.13.13-uv-

      - name: Project CI tooling through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py prek_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Clone abx-dl release for documentation examples
        run: |
          set -Eeuo pipefail
          tag="v1.11.262"
          sha="cc08a64d002bc47ac50e064c526b462f6bc9c9d2"
          checkout="${{ runner.temp }}/abx-dl"
          "${GIT_BINARY}" clone --depth=1 --branch "$tag" https://github.com/ArchiveBox/abx-dl.git "$checkout"
          [[ "$("${GIT_BINARY}" -C "$checkout" rev-parse HEAD)" == "$sha" ]]
          [[ "$("${GIT_BINARY}" -C "$checkout" rev-parse "refs/tags/${tag}^{commit}")" == "$sha" ]]

      - name: Install locked dependencies through projected uv
        run: |
          "${UV_BINARY}" sync --locked --dev --no-sources

      - name: Install abx-dl documentation dependency
        run: |
          "${UV_BINARY}" pip install --no-deps -e "${{ runner.temp }}/abx-dl"

      - name: Run prek
        run: |
          "${UV_BINARY}" run --no-sync --no-sources prek run --all-files

      - name: Run documentation code blocks
        run: |
          mapfile -t plugin_readmes < <("${UV_BINARY}" run --no-project python - <<'PY'
          from pathlib import Path

          for readme in sorted(Path("abx_plugins/plugins").glob("*/README.md")):
              print(readme)
          PY
          )
          "${UV_BINARY}" run --no-sync --no-sources pytest -vv --tb=long \
            README.md AGENTS.md skills docs "${plugin_readmes[@]}"

  build-package:
    name: Build package artifacts
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Set up Python 3.13.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.3"
          enable-cache: false

      - name: Project build tooling through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py release_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Build wheel and source distribution
        run: |
          set -Eeuo pipefail
          "${UV_BINARY}" build --no-sources --out-dir dist --clear
          shopt -s nullglob
          artifacts=(dist/*)
          wheels=(dist/abx_plugins-*.whl)
          sdists=(dist/abx_plugins-*.tar.gz)
          [[ "${#artifacts[@]}" -eq 2 ]]
          [[ "${#wheels[@]}" -eq 1 ]]
          [[ "${#sdists[@]}" -eq 1 ]]
          version="$("${UV_BINARY}" run --no-project python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          [[ "${wheels[0]}" == "dist/abx_plugins-${version}-py3-none-any.whl" ]]
          [[ "${sdists[0]}" == "dist/abx_plugins-${version}.tar.gz" ]]
          DIST_DIR=dist "${UV_BINARY}" run --no-project python - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          dist_dir = Path(os.environ["DIST_DIR"])
          artifacts = sorted((*dist_dir.glob("abx_plugins-*.whl"), *dist_dir.glob("abx_plugins-*.tar.gz")))
          lines = [f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}" for path in artifacts]
          (dist_dir / "SHA256SUMS").write_text("\n".join(lines) + "\n")
          PY

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-distributions-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
          retention-days: 90

  compatibility:
    name: ${{ matrix.artifact }} / Python ${{ matrix.python }} / ${{ matrix.os }}
    needs: build-package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
        python: ["3.12", "3.13", "3.14"]
        artifact: [wheel, sdist]

    steps:
      - name: Checkout repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.3"
          enable-cache: false

      - name: Project compatibility tooling through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py release_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Download package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-distributions-${{ github.sha }}
          path: ${{ runner.temp }}/python-distributions

      - name: Install package and run an installed hook
        shell: bash
        run: |
          set -Eeuo pipefail
          shopt -s nullglob
          case "${{ matrix.artifact }}" in
            wheel) candidates=("$RUNNER_TEMP"/python-distributions/abx_plugins-*.whl) ;;
            sdist) candidates=("$RUNNER_TEMP"/python-distributions/abx_plugins-*.tar.gz) ;;
            *) exit 2 ;;
          esac
          [[ "${#candidates[@]}" -eq 1 ]]

          smoke_root="$(mktemp -d "$RUNNER_TEMP/abx-plugins-compat.XXXXXX")"
          trap 'rm -rf "$smoke_root"' EXIT
          smoke_env="$smoke_root/env"
          data_dir="$smoke_root/data"
          mkdir -p "$data_dir/staticfile"
          printf 'hello' > "$data_dir/staticfile/output.html"

          "${UV_BINARY}" venv --python "${{ matrix.python }}" "$smoke_env"
          "${UV_BINARY}" pip install --python "$smoke_env" --no-cache "${candidates[0]}"

          unset PYTHONPATH
          cd "$smoke_root"
          hook="$({
            VIRTUAL_ENV="$smoke_env" "${UV_BINARY}" run --active --no-project python - <<'PY'
          import os
          from pathlib import Path

          import abx_plugins

          package_dir = Path(abx_plugins.__file__).resolve().parent
          environment_dir = Path(os.environ["VIRTUAL_ENV"]).resolve()
          workspace_dir = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          assert package_dir.is_relative_to(environment_dir), (package_dir, environment_dir)
          assert not package_dir.is_relative_to(workspace_dir), (package_dir, workspace_dir)
          hooks = list((package_dir / "plugins" / "hashes").glob("on_Snapshot__*_hashes.py"))
          assert len(hooks) == 1, hooks
          print(hooks[0])
          PY
          })"

          hook_output="$({
            SNAP_DIR="$data_dir" VIRTUAL_ENV="$smoke_env" \
              "${UV_BINARY}" run --active --no-project python "$hook" --url "https://example.com"
          })"
          HOOK_OUTPUT="$hook_output" SNAP_DIR="$data_dir" VIRTUAL_ENV="$smoke_env" \
            "${UV_BINARY}" run --active --no-project python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          records = [json.loads(line) for line in os.environ["HOOK_OUTPUT"].splitlines() if line]
          assert len(records) == 1, records
          assert records[0]["type"] == "ArchiveResult", records
          assert records[0]["status"] == "succeeded", records

          hashes_path = Path(os.environ["SNAP_DIR"]) / "hashes" / "hashes.json"
          hashes = json.loads(hashes_path.read_text())
          expected_hash = hashlib.sha256(b"hello").hexdigest()
          assert hashes["root_hash"] == expected_hash, hashes
          assert hashes["files"] == [
              {"path": "staticfile/output.html", "hash": expected_hash, "size": 5}
          ], hashes
          PY

  discover-tests:
    name: Discover test files
    runs-on: ubuntu-24.04
    outputs:
      test-shards: ${{ steps.set-matrix.outputs.test-shards }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.3"
          enable-cache: false

      - name: Project discovery tooling through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py release_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Discover test files
        id: set-matrix
        run: |
          "${UV_BINARY}" run --no-project python .github/ci_test_shards.py >> "$GITHUB_OUTPUT"

  run-tests:
    name: ${{ matrix.shard.name }} / Python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [discover-tests]
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        shard: ${{ fromJson(needs.discover-tests.outputs.test-shards) }}
        os: [ubuntu-24.04, macos-15]
        python: ["3.12.10", "3.13.13", "3.14.5"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.3"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-${{ matrix.python }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.python }}-uv-

      - name: Project test tooling through abxpkg
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: uv run --no-project python bin/ci_project_tools.py node_binaries --lib "$ABXPKG_LIB_DIR"

      - name: Install locked dependencies through projected uv
        run: |
          "${UV_BINARY}" sync --locked --dev --no-sources

      - name: Select Chromium for extension-capable CDP
        if: ${{ matrix.shard.needs_chromium }}
        env:
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -euo pipefail
          chromium_env="$(
            "${UV_BINARY}" run --no-sync --no-sources abxpkg env \
              --install \
              --json \
              --lib="$ABXPKG_LIB_DIR" \
              --deps-from="$PWD/abx_plugins/plugins/chrome/config.json:required_binaries"
          )"
          "${JQ_BINARY}" -r 'to_entries[] | "\(.key)=\(.value)"' \
            <<< "$chromium_env" >> "$GITHUB_ENV"

          chrome_binary="$ABXPKG_LIB_DIR/env/bin/chromium"
          echo "CHROME_BINARY=$chrome_binary" >> "$GITHUB_ENV"
          test -L "$chrome_binary"
          test -x "$chrome_binary"

      - name: Verify Chromium launch
        if: ${{ matrix.shard.needs_chromium }}
        uses: ./.github/actions/verify-chromium-launch

      - name: Run test shard - ${{ matrix.shard.name }}
        env:
          TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
          CHROME_HEADLESS: "True"
          TEST_PATHS_JSON: ${{ toJson(matrix.shard.paths) }}
        run: |
          set -Eeuo pipefail
          test_paths=()
          while IFS= read -r test_path; do
            test_paths+=("$test_path")
          done < <("${JQ_BINARY}" -r '.[]' <<< "$TEST_PATHS_JSON")
          [[ "${#test_paths[@]}" -gt 0 ]]
          "${UV_BINARY}" run --no-sync --no-sources pytest -vs -rA "${test_paths[@]}" --basetemp="$RUNNER_TEMP/pytest-out"
