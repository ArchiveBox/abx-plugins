name: Parallel Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONIOENCODING: utf-8
  PYTHONLEGACYWINDOWSSTDIO: utf-8
  USE_COLOR: False
  UV_NO_SOURCES: "1"

jobs:
  prek:
    name: Pre-commit checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 1

      - name: Configure managed library
        run: |
          mkdir -p "$RUNNER_TEMP/abx-lib/env/bin"
          echo "LIB_DIR=$RUNNER_TEMP/abx-lib" >> "$GITHUB_ENV"
          echo "ABXPKG_LIB_DIR=$RUNNER_TEMP/abx-lib" >> "$GITHUB_ENV"

      - name: Clone abx-dl release for documentation examples
        run: |
          set -Eeuo pipefail
          tag="v1.11.262"
          sha="cc08a64d002bc47ac50e064c526b462f6bc9c9d2"
          checkout="${{ runner.temp }}/abx-dl"
          git clone --depth=1 --branch "$tag" https://github.com/ArchiveBox/abx-dl.git "$checkout"
          [[ "$(git -C "$checkout" rev-parse HEAD)" == "$sha" ]]
          [[ "$(git -C "$checkout" rev-parse "refs/tags/${tag}^{commit}")" == "$sha" ]]

      - name: Set up Python 3.13.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.13"
          architecture: x64

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.3"

      - name: Set up Node JS
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22.23.1"

      - name: Enable pnpm
        run: |
          corepack enable
          PNPM_HOME="$HOME/.local/share/pnpm"
          mkdir -p "$PNPM_HOME"
          pnpm config set global-bin-dir "$PNPM_HOME"
          echo "PNPM_HOME=$PNPM_HOME" >> "$GITHUB_ENV"
          echo "$PNPM_HOME" >> "$GITHUB_PATH"

      - name: Install JS tooling
        run: pnpm add -g prettier@3.9.5

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-3.13.13-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-3.13.13-uv-

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git wget ripgrep build-essential python3-dev python3-setuptools \
            libssl-dev libldap2-dev libsasl2-dev zlib1g-dev libatomic1 \
            python3-minimal gnupg2 curl python3-ldap python3-msgpack \
            python3-mutagen python3-regex python3-pycryptodome procps

      - name: Install dependencies with uv
        run: |
          uv sync --locked --dev --no-sources
          uv pip install --no-deps -e "${{ runner.temp }}/abx-dl"

      - name: Run prek
        run: uv run --no-sync --no-sources prek run --all-files

      - name: Run documentation code blocks
        run: |
          mapfile -t plugin_readmes < <(find abx_plugins/plugins -name README.md -type f | sort)
          uv run --no-sync --no-sources pytest -vv --tb=long \
            README.md AGENTS.md skills docs "${plugin_readmes[@]}"

  build-package:
    name: Build package artifacts
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Set up Python 3.13.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.3"
          enable-cache: false

      - name: Build wheel and source distribution
        run: |
          set -Eeuo pipefail
          uv build --no-sources --out-dir dist --clear
          shopt -s nullglob
          artifacts=(dist/*)
          wheels=(dist/abx_plugins-*.whl)
          sdists=(dist/abx_plugins-*.tar.gz)
          [[ "${#artifacts[@]}" -eq 2 ]]
          [[ "${#wheels[@]}" -eq 1 ]]
          [[ "${#sdists[@]}" -eq 1 ]]
          sha256sum "${artifacts[@]}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  compatibility:
    name: ${{ matrix.artifact }} / Python ${{ matrix.python }} / ${{ matrix.os }}
    needs: build-package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
        python: ["3.12.11", "3.13.13", "3.14.5"]
        artifact: [wheel, sdist]

    steps:
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.3"
          enable-cache: false

      - name: Download package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-distributions
          path: ${{ runner.temp }}/python-distributions

      - name: Install package and run an installed hook
        shell: bash
        run: |
          set -Eeuo pipefail
          shopt -s nullglob
          case "${{ matrix.artifact }}" in
            wheel) candidates=("$RUNNER_TEMP"/python-distributions/abx_plugins-*.whl) ;;
            sdist) candidates=("$RUNNER_TEMP"/python-distributions/abx_plugins-*.tar.gz) ;;
            *) exit 2 ;;
          esac
          [[ "${#candidates[@]}" -eq 1 ]]

          smoke_root="$(mktemp -d "$RUNNER_TEMP/abx-plugins-compat.XXXXXX")"
          trap 'rm -rf "$smoke_root"' EXIT
          smoke_env="$smoke_root/env"
          data_dir="$smoke_root/data"
          mkdir -p "$data_dir/staticfile"
          printf 'hello' > "$data_dir/staticfile/output.html"

          uv venv --python "${{ matrix.python }}" "$smoke_env"
          uv pip install --python "$smoke_env" --no-cache "${candidates[0]}"

          unset PYTHONPATH
          cd "$smoke_root"
          hook="$({
            VIRTUAL_ENV="$smoke_env" uv run --active --no-project python - <<'PY'
          import os
          from pathlib import Path

          import abx_plugins

          package_dir = Path(abx_plugins.__file__).resolve().parent
          environment_dir = Path(os.environ["VIRTUAL_ENV"]).resolve()
          workspace_dir = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          assert package_dir.is_relative_to(environment_dir), (package_dir, environment_dir)
          assert not package_dir.is_relative_to(workspace_dir), (package_dir, workspace_dir)
          hooks = list((package_dir / "plugins" / "hashes").glob("on_Snapshot__*_hashes.py"))
          assert len(hooks) == 1, hooks
          print(hooks[0])
          PY
          })"

          hook_output="$({
            SNAP_DIR="$data_dir" VIRTUAL_ENV="$smoke_env" \
              uv run --active --no-project python "$hook" --url "https://example.com"
          })"
          HOOK_OUTPUT="$hook_output" SNAP_DIR="$data_dir" VIRTUAL_ENV="$smoke_env" \
            uv run --active --no-project python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          records = [json.loads(line) for line in os.environ["HOOK_OUTPUT"].splitlines() if line]
          assert len(records) == 1, records
          assert records[0]["type"] == "ArchiveResult", records
          assert records[0]["status"] == "succeeded", records

          hashes_path = Path(os.environ["SNAP_DIR"]) / "hashes" / "hashes.json"
          hashes = json.loads(hashes_path.read_text())
          expected_hash = hashlib.sha256(b"hello").hexdigest()
          assert hashes["root_hash"] == expected_hash, hashes
          assert hashes["files"] == [
              {"path": "staticfile/output.html", "hash": expected_hash, "size": 5}
          ], hashes
          PY

  discover-tests:
    name: Discover test files
    runs-on: ubuntu-24.04
    outputs:
      test-files: ${{ steps.set-matrix.outputs.test-files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 1

      - name: Discover test files
        id: set-matrix
        run: |
          set -Eeuo pipefail
          mapfile -t all_tests < <(
            {
              find abx_plugins/plugins -path "*/tests/test_*.py" -type f
              find abx_plugins/plugins -mindepth 2 -maxdepth 2 -name "test_*.py" -type f
              if [[ -d tests ]]; then
                find tests -path "*/test_*.py" -type f
              fi
            } | sort -u
          )
          [[ "${#all_tests[@]}" -gt 0 ]]

          objects=()
          for test_file in "${all_tests[@]}"; do
            test_name="$(basename "$test_file" .py | sed 's/^test_//')"
            name="$test_name"
            needs_chromium=false
            if [[ "$test_file" == abx_plugins/plugins/*/tests/* ]]; then
              plugin_dir="${test_file%/tests/*}"
              plugin_name="$(basename "$plugin_dir")"
              if [[ "$plugin_name" == "chrome" ]] || \
                 jq -e '(.required_plugins // []) | index("chrome") != null' "$plugin_dir/config.json" >/dev/null; then
                needs_chromium=true
              fi
            elif grep -iq "chrom" "$test_file"; then
              needs_chromium=true
            fi

            objects+=("$(jq -cn \
              --arg path "$test_file" \
              --arg name "$name" \
              --argjson needs_chromium "$needs_chromium" \
              '{path: $path, name: $name, needs_chromium: $needs_chromium}')")
          done
          json_array="$(printf '%s\n' "${objects[@]}" | jq -sc '.')"

          echo "test-files=$json_array" >> "$GITHUB_OUTPUT"
          echo "Found ${#all_tests[@]} test files"
          echo "$json_array" | jq '.'

  run-tests:
    name: ${{ matrix.test.name }}
    runs-on: ubuntu-24.04
    needs: [discover-tests]
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ABX_PYTEST_TEE_SUBPROCESS_OUTPUT: "1"

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        test: ${{ fromJson(needs.discover-tests.outputs.test-files) }}
        python: ["3.13.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
          architecture: x64

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.3"

      - name: Set up Node JS
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22.23.1"

      - name: Cache uv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-${{ matrix.python }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.python }}-uv-

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git wget ripgrep build-essential python3-dev python3-setuptools \
            libssl-dev libldap2-dev libsasl2-dev zlib1g-dev libatomic1 \
            python3-minimal gnupg2 curl python3-ldap python3-msgpack \
            python3-mutagen python3-regex python3-pycryptodome procps

      - name: Install dependencies with uv
        run: uv sync --locked --dev --no-sources

      - name: Select Chromium for extension-capable CDP
        if: ${{ matrix.test.needs_chromium }}
        env:
          LIB_DIR: ${{ runner.temp }}/abx-lib
          ABXPKG_LIB_DIR: ${{ runner.temp }}/abx-lib
        run: |
          set -euo pipefail
          mkdir -p "$LIB_DIR"
          {
            echo "LIB_DIR=$LIB_DIR"
            echo "ABXPKG_LIB_DIR=$ABXPKG_LIB_DIR"
          } >> "$GITHUB_ENV"

          uv run --no-sync --no-sources abxpkg env \
            --install \
            --lib="$LIB_DIR" \
            --deps-from="$PWD/abx_plugins/plugins/chrome/config.json:required_binaries" \
            >> "$GITHUB_ENV"

      - name: Verify Chromium launch
        if: ${{ matrix.test.needs_chromium }}
        uses: ./.github/actions/verify-chromium-launch

      - name: Run test - ${{ matrix.test.name }}
        env:
          TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
          CHROME_HEADLESS: "True"
        run: |
          uv run --no-sync --no-sources pytest -vs -rA "${{ matrix.test.path }}" --basetemp="$RUNNER_TEMP/pytest-out"
